name: searx
description: Android app for searching the web with Searx

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.17.0 <3.0.0'  # Atualizado para compatibilidade com novas versões

dependencies:
  flutter:
    sdk: flutter

  # 📦 Dependências principais
  cupertino_icons: ^1.0.6
  http: ^1.2.0               # Para chamadas à API JSON (SUBSTITUI A WEBVIEW)
  url_launcher: ^6.2.5       # Para abrir links no navegador
  shared_preferences: ^2.2.2 # Para salvar preferências (se quiser)
  fluttertoast: ^8.2.4       # Para mensagens rápidas
  flutter_phoenix: ^1.1.0    # Para reiniciar o app (opcional)

  # Ícones do launcher
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/searx.webp"
  adaptive_icon_background: "#118c89"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/searx.webp
