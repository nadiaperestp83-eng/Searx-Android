buildscript {
    ext.kotlin_version = '1.8.22' // Atualizado para um Kotlin compatível
    repositories {
        google()
        mavenCentral() // jcenter() foi descontinuado, substitua por mavenCentral()
    }

    dependencies {
        // Atualizado para 7.3.0 - é o "limite" de compatibilidade para projetos mais antigos
        classpath 'com.android.tools.build:gradle:7.3.0' 
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
